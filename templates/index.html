<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WINTER WOLF | Human Emotion Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
        }
        .creator {
            margin-top: 15px;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
        }
        .main-content {
            padding: 30px;
        }
        .mode-tabs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .mode-btn {
            padding: 12px 30px;
            background: #f0f0f0;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .mode-panel {
            display: none;
        }
        .mode-panel.active {
            display: block;
        }
        .webcam-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        #local-video {
            width: 100%;
            height: auto;
            display: block;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        .action-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
        }
        .results-panel {
            margin-top: 30px;
            background: #f8f9ff;
            border-radius: 20px;
            padding: 20px;
        }
        .result-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .result-emotion {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background: #1e2a3a;
            color: white;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧠 Human Emotion Detection System</h1>
        <p>AI-powered Real-time Facial Expression Recognition</p>
        <div class="creator">🐺 Created by WINTER WOLF</div>
    </div>

    <div class="main-content">
        <div class="mode-tabs">
            <button class="mode-btn active" onclick="switchMode('live')">📹 Live Camera</button>
            <button class="mode-btn" onclick="switchMode('upload')">🖼️ Upload Image</button>
        </div>

        <!-- Live Camera Mode -->
        <div id="live-mode" class="mode-panel active">
            <div class="webcam-container">
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div class="controls">
                <button class="action-btn" id="start-cam-btn">▶️ Start Camera</button>
                <button class="action-btn" id="stop-cam-btn" style="display: none;">⏹️ Stop Camera</button>
            </div>
        </div>

        <!-- Upload Image Mode -->
        <div id="upload-mode" class="mode-panel">
            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <div>📤 Click to upload an image (JPG, PNG)</div>
                <input type="file" id="imageInput" accept="image/jpeg,image/png" style="display: none;">
            </div>
            <div class="preview-container hidden">
                <img id="preview-img" style="max-width:100%; border-radius:15px;">
                <button class="action-btn" onclick="detectFromUpload()">🔍 Detect Emotion</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="results-panel hidden">
            <h3>📊 Detection Results</h3>
            <div id="results-list"></div>
        </div>

        <!-- History Section -->
        <div class="results-panel">
            <h3>📜 Recent Detection History</h3>
            <div id="history-list">No history yet.</div>
        </div>
    </div>

    <div class="footer">
        <p>Made with 🐺 by WINTER WOLF</p>
    </div>
</div>

<script>
    let mediaStream = null;
    let captureInterval = null;
    let isProcessing = false;

    const localVideo = document.getElementById('local-video');
    const startBtn = document.getElementById('start-cam-btn');
    const stopBtn = document.getElementById('stop-cam-btn');

    async function startWebcam() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
            localVideo.srcObject = mediaStream;
            localVideo.play();
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            startFrameCapture();
        } catch (err) {
            alert("Camera access denied or error: " + err.message);
        }
    }

    function stopWebcam() {
        if (captureInterval) clearInterval(captureInterval);
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            localVideo.srcObject = null;
        }
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
    }

    function startFrameCapture() {
        if (captureInterval) clearInterval(captureInterval);
        captureInterval = setInterval(() => {
            if (localVideo.readyState === 4 && !isProcessing) {
                captureAndDetect();
            }
        }, 500);
    }

    async function captureAndDetect() {
        if (isProcessing) return;
        isProcessing = true;
        const canvas = document.createElement('canvas');
        canvas.width = localVideo.videoWidth;
        canvas.height = localVideo.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(localVideo, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/jpeg');
        await detectEmotion(imageData);
        isProcessing = false;
    }

    async function detectEmotion(imageData) {
        showLoading();
        try {
            const response = await fetch('/detect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            const data = await response.json();
            if (data.success && data.results && data.results.length > 0) {
                displayResults(data.results);
                refreshHistory();
            } else {
                showError('No face detected. Try adjusting lighting or position.');
            }
        } catch (err) {
            showError('Detection failed. Check network.');
        }
    }

    function displayResults(results) {
        const resultsDiv = document.getElementById('results-list');
        resultsDiv.innerHTML = '';
        results.forEach(res => {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `<div class="result-emotion">${res.emotion}</div><div>Confidence: ${(res.confidence * 100).toFixed(1)}%</div>`;
            resultsDiv.appendChild(card);
        });
        document.getElementById('results-section').classList.remove('hidden');
    }

    function showLoading() {
        const resultsDiv = document.getElementById('results-list');
        resultsDiv.innerHTML = '<div class="result-card">🤔 Analyzing...</div>';
        document.getElementById('results-section').classList.remove('hidden');
    }

    function showError(msg) {
        const resultsDiv = document.getElementById('results-list');
        resultsDiv.innerHTML = `<div class="result-card" style="color:red;">❌ ${msg}</div>`;
    }

    function switchMode(mode) {
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.mode-panel').forEach(panel => panel.classList.remove('active'));
        if (mode === 'live') {
            document.querySelector('.mode-btn:first-child').classList.add('active');
            document.getElementById('live-mode').classList.add('active');
            document.getElementById('upload-mode').classList.remove('active');
            if (!mediaStream) startWebcam();
        } else {
            document.querySelector('.mode-btn:last-child').classList.add('active');
            document.getElementById('upload-mode').classList.add('active');
            document.getElementById('live-mode').classList.remove('active');
            stopWebcam();
        }
        document.getElementById('results-section').classList.add('hidden');
    }

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('preview-img').src = event.target.result;
            document.querySelector('.preview-container').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    });

    async function detectFromUpload() {
        const img = document.getElementById('preview-img');
        if (!img.src) return;
        await detectEmotion(img.src);
    }

    async function refreshHistory() {
        try {
            const response = await fetch('/history');
            const data = await response.json();
            if (data.success && data.history && data.history.length > 0) {
                const historyDiv = document.getElementById('history-list');
                historyDiv.innerHTML = '';
                data.history.slice().reverse().slice(0, 10).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-card';
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<span>${item.emotion}</span> <span>${(item.confidence * 100).toFixed(1)}%</span> <small>${new Date(item.timestamp).toLocaleTimeString()}</small>`;
                    historyDiv.appendChild(div);
                });
            }
        } catch (err) {}
    }

    startBtn.onclick = startWebcam;
    stopBtn.onclick = stopWebcam;
    refreshHistory();
    setInterval(refreshHistory, 5000);
</script>
</body>
</html>
